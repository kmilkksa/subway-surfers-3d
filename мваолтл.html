<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Endless Runner 3D</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial; background: #000; }
#ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; }
#menu, #gameOver {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: white; text-align: center;
}
button { padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="menu">
<h1>Runner 3D</h1>
<button onclick="startGame()">Start</button>
</div>

<div id="gameOver" style="display:none;">
<h1>Game Over</h1>
<button onclick="restart()">Restart</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, velocityY = 0, isJumping = false, isSliding = false;
let lane = 0;
let speed = 0.2;
let obstacles = [];
let coins = [];
let score = 0;
let gameRunning = false;

const lanes = [-2, 0, 2];

init();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 10);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,7);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));

  const groundGeo = new THREE.PlaneGeometry(20, 200);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.position.z = -50;
  scene.add(ground);

  const geo = new THREE.BoxGeometry(1,2,1);
  const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
  player = new THREE.Mesh(geo, mat);
  player.position.y = 1;
  scene.add(player);

  window.addEventListener('keydown', controls);
  animate();
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  gameRunning = true;
}

function restart() {
  location.reload();
}

function controls(e) {
  if (!gameRunning) return;

  if (e.key === 'ArrowLeft' && lane > 0) lane--;
  if (e.key === 'ArrowRight' && lane < 2) lane++;
  if (e.key === 'ArrowUp' && !isJumping) {
    velocityY = 0.35;
    isJumping = true;
  }
  if (e.key === 'ArrowDown') isSliding = true;
}

function spawnObstacle() {
  const geo = new THREE.BoxGeometry(1,2,1);
  const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
  const obs = new THREE.Mesh(geo, mat);
  const randomLane = Math.floor(Math.random()*3);
  obs.position.set(lanes[randomLane],1,-100);
  scene.add(obs);
  obstacles.push(obs);
}

function spawnCoin() {
  const geo = new THREE.CylinderGeometry(0.5,0.5,0.2,16);
  const mat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
  const coin = new THREE.Mesh(geo, mat);
  const randomLane = Math.floor(Math.random()*3);
  coin.rotation.x = Math.PI/2;
  coin.position.set(lanes[randomLane],1,-100);
  scene.add(coin);
  coins.push(coin);
}

function animate() {
  requestAnimationFrame(animate);

  if (gameRunning) {
    player.position.x += (lanes[lane] - player.position.x)*0.2;

    if (isJumping) {
      player.position.y += velocityY;
      velocityY -= 0.02;
      if (player.position.y <= 1) {
        player.position.y = 1;
        isJumping = false;
      }
    }

    obstacles.forEach((o,i)=>{
      o.position.z += speed*50;
      if (o.position.z > 10) {
        scene.remove(o);
        obstacles.splice(i,1);
      }

      if (Math.abs(o.position.z - player.position.z) < 1 &&
          Math.abs(o.position.x - player.position.x) < 1 &&
          player.position.y < 2) {
        gameOver();
      }
    });

    coins.forEach((c,i)=>{
      c.position.z += speed*50;
      c.rotation.z += 0.1;

      if (Math.abs(c.position.z - player.position.z) < 1 &&
          Math.abs(c.position.x - player.position.x) < 1) {
        scene.remove(c);
        coins.splice(i,1);
        score += 10;
      }

      if (c.position.z > 10) {
        scene.remove(c);
        coins.splice(i,1);
      }
    });

    if (Math.random() < 0.02) spawnObstacle();
    if (Math.random() < 0.02) spawnCoin();

    speed += 0.0001;
    score += 0.1;

    document.getElementById('score').innerText = Math.floor(score);

    camera.position.x = player.position.x;
    camera.lookAt(player.position);
  }

  renderer.render(scene, camera);
}

function gameOver() {
  gameRunning = false;
  document.getElementById('gameOver').style.display = 'block';
}
</script>

</body>
</html>
