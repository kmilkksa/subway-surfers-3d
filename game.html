<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway Surfers 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Poppins', sans-serif; background: #87CEEB; user-select: none; -webkit-user-select: none; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; color: white; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(180deg, rgba(255,140,0,0.9) 0%, rgba(255,69,0,0.95) 100%); pointer-events: auto; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { opacity: 0; transform: scale(1.1); pointer-events: none !important; }
        
        h1 { font-family: 'Bangers', cursive; font-size: clamp(4rem, 15vw, 8rem); color: #fff; text-shadow: 4px 4px 0 #ff6b35, 8px 8px 0 rgba(0,0,0,0.3); letter-spacing: 8px; animation: titleBounce 2s ease-in-out infinite; transform-origin: center; }
        @keyframes titleBounce { 0%, 100% { transform: scale(1) rotate(-2deg); } 50% { transform: scale(1.05) rotate(2deg); } }
        .subtitle { font-size: 1.5rem; color: #fff; margin-bottom: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        .btn { padding: 1.2rem 3rem; font-family: 'Bangers', cursive; font-size: 2rem; border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 3px; position: relative; overflow: hidden; }
        .btn-play { background: linear-gradient(180deg, #4CAF50 0%, #2E7D32 100%); color: white; box-shadow: 0 6px 0 #1B5E20, 0 10px 20px rgba(0,0,0,0.3); }
        .btn-play:hover { transform: translateY(-4px); box-shadow: 0 10px 0 #1B5E20, 0 15px 30px rgba(0,0,0,0.4); }
        .btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 #1B5E20; }
        .btn-retry { background: linear-gradient(180deg, #FF5722 0%, #E64A19 100%); color: white; box-shadow: 0 6px 0 #BF360C, 0 10px 20px rgba(0,0,0,0.3); }
        .btn-retry:hover { transform: translateY(-4px); }
        .btn-retry:active { transform: translateY(4px); box-shadow: 0 2px 0 #BF360C; }
        .btn-menu { background: linear-gradient(180deg, #9E9E9E 0%, #757575 100%); color: white; box-shadow: 0 6px 0 #616161, 0 10px 20px rgba(0,0,0,0.3); margin-top: 1rem; }
        .btn-menu:hover { transform: translateY(-4px); }
        .btn-menu:active { transform: translateY(4px); box-shadow: 0 2px 0 #616161; }
        
        .controls-hint { display: flex; gap: 2rem; margin-top: 2rem; font-size: 0.9rem; color: rgba(255,255,255,0.9); }
        .control-key { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .key { background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.5); padding: 0.5rem 1rem; border-radius: 8px; font-weight: bold; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 12px; }
        .stat-box { background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 100%); padding: 12px 24px; border-radius: 30px; border: 3px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 12px; font-size: 1.3rem; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .stat-icon { font-size: 1.5rem; }
        .multiplier-badge { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #333; padding: 4px 12px; border-radius: 20px; font-size: 1rem; font-weight: 900; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        #powerups { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; pointer-events: none; }
        .power-timer { padding: 12px 20px; border-radius: 25px; font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: powerGlow 0.3s infinite alternate; border: 3px solid rgba(255,255,255,0.5); }
        @keyframes powerGlow { from { transform: scale(1) translateY(0); } to { transform: scale(1.05) translateY(-5px); } }
        .power-icon { font-size: 1.3rem; }
        
        #msg { position: absolute; top: 30%; width: 100%; text-align: center; font-family: 'Bangers', cursive; font-size: clamp(2rem, 8vw, 5rem); color: #fff; pointer-events: none; opacity: 0; transform: scale(0.5) rotate(-10deg); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); text-shadow: 4px 4px 0 rgba(0,0,0,0.3); }
        .show-msg { opacity: 1; transform: scale(1.2) rotate(0deg); }
        
        #nearMiss { position: absolute; top: 40%; width: 100%; text-align: center; font-family: 'Bangers', cursive; font-size: 2rem; color: #FFD700; pointer-events: none; opacity: 0; transform: translateY(20px); transition: all 0.3s; text-shadow: 2px 2px 0 #FF6B35; }
        .show-nearmiss { opacity: 1; transform: translateY(0); }
        
        #gameOver { background: linear-gradient(180deg, rgba(139,0,0,0.95) 0%, rgba(139,0,0,0.98) 100%); }
        #gameOver h1 { color: #FFD700; text-shadow: 4px 4px 0 #B8860B, 8px 8px 0 rgba(0,0,0,0.3); }
        .final-stats { background: rgba(0,0,0,0.5); padding: 2rem 3rem; border-radius: 20px; margin: 1rem 0; text-align: center; border: 3px solid rgba(255,255,255,0.2); }
        .final-score { font-family: 'Bangers', cursive; font-size: 3rem; color: #fff; }
        .final-coins { font-size: 1.5rem; color: #FFD700; margin-top: 0.5rem; }
        .final-distance { font-size: 1.2rem; color: rgba(255,255,255,0.8); margin-top: 0.5rem; }
        
        #chaseOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 0%, rgba(255,0,0,0.3) 50%, transparent 100%); pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        .chase-active { opacity: 1; animation: chaseFlash 0.5s infinite; }
        @keyframes chaseFlash { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        
        #mobileControls { position: absolute; bottom: 100px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 25px; pointer-events: auto; }
        .mobile-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.4); color: white; font-size: 2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .mobile-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        .move-btns { display: flex; gap: 20px; }
        
        #speedLines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .speed-line { position: absolute; width: 3px; height: 100px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6), transparent); animation: speedLine 0.3s linear forwards; }
        @keyframes speedLine { from { transform: translateY(-100px); opacity: 1; } to { transform: translateY(100vh); opacity: 0; } }
        
        @media (max-width: 768px) { #mobileControls { display: flex; } .controls-hint { display: none; } }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="menu" class="screen">
            <h1>SURF RUSH</h1>
            <p class="subtitle">Endless Runner Adventure</p>
            <button class="btn btn-play" id="startBtn">▶ PLAY</button>
            <div class="controls-hint">
                <div class="control-key"><span class="key">← →</span><span>Move</span></div>
                <div class="control-key"><span class="key">↑ / SPACE</span><span>Jump</span></div>
                <div class="control-key"><span class="key">↓</span><span>Slide</span></div>
            </div>
        </div>
        
        <div id="hud" class="hidden">
            <div class="hud-left">
                <div class="stat-box"><span class="stat-icon">🏃</span><span>SCORE:</span><span id="score">0</span></div>
                <div class="stat-box"><span class="stat-icon">💰</span><span id="coinCount">0</span></div>
            </div>
            <div class="hud-right">
                <div class="stat-box"><span class="stat-icon">📏</span><span>LEVEL:</span><span id="level">1</span></div>
                <div id="multiplierBox" class="multiplier-badge" style="display:none">x<span id="multiplier">1</span></div>
            </div>
        </div>
        
        <div id="powerups"></div>
        <div id="msg"></div>
        <div id="nearMiss"></div>
        <div id="chaseOverlay"></div>
        <div id="speedLines"></div>
        
        <div id="mobileControls">
            <div class="move-btns">
                <button class="mobile-btn" id="leftBtn">◀</button>
                <button class="mobile-btn" id="rightBtn">▶</button>
            </div>
            <div class="move-btns">
                <button class="mobile-btn" id="jumpBtn">▲</button>
                <button class="mobile-btn" id="slideBtn">▼</button>
            </div>
        </div>
        
        <div id="gameOver" class="screen hidden">
            <h1>CRASHED!</h1>
            <div class="final-stats">
                <div class="final-score">Score: <span id="finalScore">0</span></div>
                <div class="final-coins">Coins: <span id="finalCoins">0</span></div>
                <div class="final-distance">Distance: <span id="finalDistance">0</span>m</div>
            </div>
            <button class="btn btn-retry" id="retryBtn">↻ RETRY</button>
            <button class="btn btn-menu" id="menuBtn">☰ MENU</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function() {
        'use strict';

        const CONFIG = {
            LANES: [-3.5, 0, 3.5],
            LANE_WIDTH: 3.5,
            JUMP_FORCE: 0.35,
            GRAVITY: 0.018,
            INITIAL_SPEED: 0.5,
            MAX_SPEED: 1.8,
            SEGMENT_LENGTH: 50,
            COLORS: {
                SKY: 0x87CEEB,
                GROUND: 0x8B4513,
                TRACK: 0x808080,
                PLAYER_HEAD: 0xFFE4C4,
                PLAYER_BODY: 0xFF4444,
                PLAYER_SHIRT: 0x4444FF,
                COIN: 0xFFD700,
                TRAIN: 0xFF0000,
                TRAIN2: 0x0000FF,
                OBSTACLE_BARREL: 0x8B4513,
                OBSTACLE_CONE: 0xFF6600,
                OBSTACLE_BLOCK: 0x666666
            }
        };

        const GameState = { MENU: 'MENU', PLAYING: 'PLAYING', CHASE: 'CHASE', GAME_OVER: 'GAME_OVER' };

        class Player {
            constructor(scene) {
                this.scene = scene;
                this.group = new THREE.Group();
                this.box = new THREE.Box3();
                
                this.createMesh();
                scene.add(this.group);
                
                this.currentLane = 0;
                this.targetLane = 0;
                this.velocityY = 0;
                this.isGrounded = true;
                this.isSliding = false;
                this.slideTimer = 0;
                this.isFlying = false;
                this.invincible = false;
                this.nearMissTimer = 0;
                
                this.runPhase = 0;
                this.bodyParts = {};
            }

            createMesh() {
                const skinMat = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.PLAYER_HEAD, roughness: 0.8 });
                const shirtMat = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.PLAYER_SHIRT, roughness: 0.6 });
                const pantsMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 });
                const shoesMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
                
                this.bodyParts.head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), skinMat);
                this.bodyParts.head.position.y = 1.7;
                this.bodyParts.head.castShadow = true;
                this.group.add(this.bodyParts.head);
                
                this.bodyParts.hair = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2), new THREE.MeshStandardMaterial({ color: 0x4A3728 }));
                this.bodyParts.hair.position.y = 1.75;
                this.group.add(this.bodyParts.hair);
                
                this.bodyParts.torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 0.4), shirtMat);
                this.bodyParts.torso.position.y = 1.1;
                this.bodyParts.torso.castShadow = true;
                this.group.add(this.bodyParts.torso);
                
                this.bodyParts.leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), shirtMat);
                this.bodyParts.leftArm.position.set(-0.5, 1.1, 0);
                this.group.add(this.bodyParts.leftArm);
                
                this.bodyParts.rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), shirtMat);
                this.bodyParts.rightArm.position.set(0.5, 1.1, 0);
                this.group.add(this.bodyParts.rightArm);
                
                this.bodyParts.leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), pantsMat);
                this.bodyParts.leftLeg.position.set(-0.18, 0.35, 0);
                this.bodyParts.leftLeg.castShadow = true;
                this.group.add(this.bodyParts.leftLeg);
                
                this.bodyParts.rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.25), pantsMat);
                this.bodyParts.rightLeg.position.set(0.18, 0.35, 0);
                this.bodyParts.rightLeg.castShadow = true;
                this.group.add(this.bodyParts.rightLeg);
                
                this.bodyParts.leftShoe = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.15, 0.35), shoesMat);
                this.bodyParts.leftShoe.position.set(-0.18, 0.075, 0.05);
                this.group.add(this.bodyParts.leftShoe);
                
                this.bodyParts.rightShoe = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.15, 0.35), shoesMat);
                this.bodyParts.rightShoe.position.set(0.18, 0.075, 0.05);
                this.group.add(this.bodyParts.rightShoe);
                
                this.glowMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(1.2, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0x00FF00, transparent: true, opacity: 0 })
                );
                this.glowMesh.position.y = 1;
                this.group.add(this.glowMesh);
            }

            reset() {
                this.currentLane = 0;
                this.targetLane = 0;
                this.group.position.set(CONFIG.LANES[0], 0, 0);
                this.velocityY = 0;
                this.isGrounded = true;
                this.isSliding = false;
                this.slideTimer = 0;
                this.isFlying = false;
                this.invincible = false;
                this.nearMissTimer = 0;
                this.runPhase = 0;
                
                this.resetBodyParts();
            }

            resetBodyParts() {
                this.bodyParts.head.position.y = 1.7;
                this.bodyParts.head.scale.set(1, 1, 1);
                this.bodyParts.torso.scale.set(1, 1, 1);
                this.bodyParts.torso.position.y = 1.1;
                this.bodyParts.leftArm.scale.set(1, 1, 1);
                this.bodyParts.rightArm.scale.set(1, 1, 1);
                this.bodyParts.leftLeg.scale.set(1, 1, 1);
                this.bodyParts.rightLeg.scale.set(1, 1, 1);
                this.bodyParts.leftShoe.position.z = 0.05;
                this.bodyParts.rightShoe.position.z = 0.05;
                this.glowMesh.material.opacity = 0;
                this.glowMesh.visible = false;
                
                if (this.flame) {
                    this.group.remove(this.flame);
                    this.flame = null;
                }
            }

            moveLeft() { if (this.targetLane > 0) this.targetLane--; }
            moveRight() { if (this.targetLane < 2) this.targetLane++; }

            jump() {
                if (this.isGrounded && !this.isSliding && !this.isFlying) {
                    this.velocityY = CONFIG.JUMP_FORCE;
                    this.isGrounded = false;
                    if (this.isSliding) {
                        this.resetBodyParts();
                        this.isSliding = false;
                    }
                }
            }

            slide() {
                if (this.isGrounded && !this.isSliding && !this.isFlying) {
                    this.isSliding = true;
                    this.slideTimer = 40;
                    this.bodyParts.torso.scale.y = 0.4;
                    this.bodyParts.torso.position.y = 0.6;
                    this.bodyParts.head.position.y = 0.5;
                    this.bodyParts.head.scale.y = 0.7;
                    this.bodyParts.leftArm.scale.y = 0.4;
                    this.bodyParts.rightArm.scale.y = 0.4;
                    this.bodyParts.leftLeg.scale.y = 0.3;
                    this.bodyParts.rightLeg.scale.y = 0.3;
                    this.bodyParts.leftShoe.position.z = 0;
                    this.bodyParts.rightShoe.position.z = 0;
                }
            }

            activateShield() {
                this.invincible = true;
                this.glowMesh.visible = true;
                this.glowMesh.material.color.setHex(0x00FF00);
                this.glowMesh.material.opacity = 0.3;
            }

            deactivateShield() {
                this.invincible = false;
                this.glowMesh.visible = false;
            }

            activateJetpack() {
                this.isFlying = true;
                this.glowMesh.visible = true;
                this.glowMesh.material.color.setHex(0xFF6600);
                this.glowMesh.material.opacity = 0.4;
                this.glowMesh.scale.set(2, 2, 2);
                
                if (!this.flame) {
                    this.flame = new THREE.Group();
                    for (let i = 0; i < 3; i++) {
                        const flame = new THREE.Mesh(
                            new THREE.ConeGeometry(0.15 - i * 0.03, 0.8 + i * 0.2, 8),
                            new THREE.MeshBasicMaterial({ color: 0xFF4500, transparent: true, opacity: 0.8 - i * 0.2 })
                        );
                        flame.rotation.x = Math.PI;
                        flame.position.y = -0.5 - i * 0.1;
                        this.flame.add(flame);
                    }
                    this.group.add(this.flame);
                }
            }

            deactivateJetpack() {
                this.isFlying = false;
                this.glowMesh.visible = false;
                this.glowMesh.scale.set(1, 1, 1);
                if (this.flame) {
                    this.group.remove(this.flame);
                    this.flame = null;
                }
            }

            update(delta, speed) {
                const lerpFactor = 0.25;
                this.group.position.x += (CONFIG.LANES[this.targetLane] - this.group.position.x) * lerpFactor;
                
                if (this.isFlying) {
                    this.group.position.y = 5 + Math.sin(Date.now() * 0.003) * 0.5;
                    if (this.flame) {
                        this.flame.scale.y = 1 + Math.random() * 0.5;
                        this.flame.children.forEach((f, i) => f.material.opacity = 0.6 - i * 0.15 + Math.random() * 0.2);
                    }
                } else {
                    this.velocityY -= CONFIG.GRAVITY;
                    this.group.position.y += this.velocityY;
                    if (this.group.position.y <= 0) {
                        this.group.position.y = 0;
                        this.velocityY = 0;
                        this.isGrounded = true;
                    }
                }
                
                if (this.isSliding) {
                    this.slideTimer--;
                    if (this.slideTimer <= 0) {
                        this.isSliding = false;
                        this.resetBodyParts();
                    }
                }
                
                if (this.nearMissTimer > 0) this.nearMissTimer--;
                
                this.runPhase += delta * speed * 30;
                if (this.isGrounded && !this.isSliding && !this.isFlying) {
                    const swing = Math.sin(this.runPhase) * 0.5;
                    this.bodyParts.leftLeg.rotation.x = swing;
                    this.bodyParts.rightLeg.rotation.x = -swing;
                    this.bodyParts.leftArm.rotation.x = -swing * 0.7;
                    this.bodyParts.rightArm.rotation.x = swing * 0.7;
                    this.bodyParts.leftShoe.position.z = 0.05 + swing * 0.1;
                    this.bodyParts.rightShoe.position.z = 0.05 - swing * 0.1;
                } else {
                    this.bodyParts.leftLeg.rotation.x = 0;
                    this.bodyParts.rightLeg.rotation.x = 0;
                    this.bodyParts.leftArm.rotation.x = 0;
                    this.bodyParts.rightArm.rotation.x = 0;
                }
                
                this.glowMesh.position.y = this.group.position.y + 1;
                
                const h = this.isSliding ? 0.8 : 2.2;
                const yOff = this.isSliding ? 0.4 : 1.1;
                const p = this.group.position;
                this.box.set(
                    new THREE.Vector3(p.x - 0.35, yOff - h/2, p.z - 0.3),
                    new THREE.Vector3(p.x + 0.35, yOff + h/2, p.z + 0.3)
                );
            }

            getPosition() { return this.group.position; }
            getNearMiss() { return this.nearMissTimer > 0; }
            triggerNearMiss() { this.nearMissTimer = 30; }
        }

        class ObstacleManager {
            constructor(scene) {
                this.scene = scene;
                this.obstacles = [];
                this.coins = [];
                this.powerUps = [];
                this.trains = [];
                this.lastZ = 0;
                this.segIndex = 0;
                
                this.materials = {
                    barrel: new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.OBSTACLE_BARREL, roughness: 0.7 }),
                    cone: new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.OBSTACLE_CONE, roughness: 0.5 }),
                    block: new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.OBSTACLE_BLOCK, roughness: 0.6 }),
                    train1: new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.TRAIN, roughness: 0.4, metalness: 0.3 }),
                    train2: new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.TRAIN2, roughness: 0.4, metalness: 0.3 }),
                    rail: new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.3 })
                };
                
                this.geometries = {
                    barrel: new THREE.CylinderGeometry(0.5, 0.6, 1.2, 12),
                    cone: new THREE.ConeGeometry(0.5, 1.2, 8),
                    block: new THREE.BoxGeometry(2.5, 1.5, 1.5),
                    trainBody: new THREE.BoxGeometry(3, 3, 8),
                    trainFront: new THREE.BoxGeometry(3, 3, 1),
                    trainWindow: new THREE.BoxGeometry(0.8, 0.8, 0.1),
                    wheel: new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16),
                    rail: new THREE.BoxGeometry(0.3, 0.1, 100)
                };
                
                this.createEnvironment();
            }

            createEnvironment() {
                const groundGeo = new THREE.PlaneGeometry(40, 2000);
                const groundMat = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.GROUND, roughness: 0.9 });
                this.ground = new THREE.Mesh(groundGeo, groundMat);
                this.ground.rotation.x = -Math.PI / 2;
                this.ground.receiveShadow = true;
                this.scene.add(this.ground);
                
                for (let i = 0; i < 3; i++) {
                    const trackGeo = new THREE.PlaneGeometry(3.2, 2000);
                    const trackMat = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.TRACK, roughness: 0.8 });
                    const track = new THREE.Mesh(trackGeo, trackMat);
                    track.rotation.x = -Math.PI / 2;
                    track.position.set(CONFIG.LANES[i], 0.02, -500);
                    track.receiveShadow = true;
                    this.scene.add(track);
                }
                
                const railGeo = this.geometries.rail;
                for (let side = -1; side <= 1; side += 2) {
                    for (let z = 0; z > -1000; z -= 50) {
                        const rail = new THREE.Mesh(railGeo, this.materials.rail);
                        rail.position.set(side * 5.5, 0.15, z);
                        this.scene.add(rail);
                    }
                }
                
                for (let z = 0; z > -1000; z -= 20) {
                    this.createDecorations(z);
                }
            }

            createDecorations(z) {
                const colors = [0x228B22, 0x32CD32, 0x006400];
                const bush = new THREE.Mesh(
                    new THREE.SphereGeometry(0.8 + Math.random() * 0.5, 8, 8),
                    new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], roughness: 0.9 })
                );
                bush.position.set(-10 - Math.random() * 5, 0.5, z);
                bush.scale.y = 0.7;
                bush.castShadow = true;
                this.scene.add(bush);
                
                const bush2 = bush.clone();
                bush2.position.set(10 + Math.random() * 5, 0.5, z);
                this.scene.add(bush2);
                
                if (Math.random() > 0.7) {
                    const signGeo = new THREE.BoxGeometry(0.1, 2, 0.1);
                    const signMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
                    const pole = new THREE.Mesh(signGeo, signMat);
                    pole.position.set(-7, 1, z);
                    this.scene.add(pole);
                    
                    const signBoard = new THREE.Mesh(
                        new THREE.BoxGeometry(1.5, 0.8, 0.1),
                        new THREE.MeshStandardMaterial({ color: Math.random() > 0.5 ? 0xFF0000 : 0xFFFFFF })
                    );
                    signBoard.position.set(-6.5, 1.8, z);
                    this.scene.add(signBoard);
                }
            }

            generateSegment(playerZ) {
                const startZ = this.lastZ - CONFIG.SEGMENT_LENGTH;
                this.segIndex++;
                
                const difficulty = Math.min(1, this.segIndex / 20);
                
                if (this.segIndex > 3 && Math.random() > 0.6) {
                    const lane = Math.floor(Math.random() * 3);
                    this.createTrain(lane, startZ - 10);
                }
                
                const numObstacles = 2 + Math.floor(difficulty * 3);
                const occupiedLanes = [];
                
                for (let i = 0; i < numObstacles; i++) {
                    const localZ = startZ + (i / numObstacles) * CONFIG.SEGMENT_LENGTH;
                    const avail = [0, 1, 2].filter(l => !occupiedLanes.includes(l));
                    if (avail.length === 0) continue;
                    
                    const lane = avail[Math.floor(Math.random() * avail.length)];
                    occupiedLanes.push(lane);
                    
                    const roll = Math.random();
                    let type, height;
                    if (roll < 0.3) { type = 'barrel'; height = 0.6; }
                    else if (roll < 0.6) { type = 'cone'; height = 0.6; }
                    else { type = 'block'; height = 0.75; }
                    
                    this.createObstacle(type, lane, localZ, height);
                    
                    if (Math.random() > 0.4 && Math.random() < 0.7) {
                        const adj = lane + (Math.random() > 0.5 ? 1 : -1);
                        if (adj >= 0 && adj <= 2 && !occupiedLanes.includes(adj)) {
                            occupiedLanes.push(adj);
                            this.createObstacle('barrel', adj, localZ, 0.6);
                        }
                    }
                    
                    if (Math.random() > 0.3) {
                        const coinLanes = [0, 1, 2].filter(l => !occupiedLanes.includes(l));
                        if (coinLanes.length > 0) {
                            const cLane = coinLanes[Math.floor(Math.random() * coinLanes.length)];
                            const coinCount = 3 + Math.floor(Math.random() * 4);
                            for (let c = 0; c < coinCount; c++) {
                                this.createCoin(cLane, localZ + 3 + c * 2.5, 1.5);
                            }
                        }
                    }
                }
                
                if (Math.random() > 0.8 || this.segIndex < 3) {
                    const powerLanes = [0, 1, 2].filter(l => !occupiedLanes.includes(l));
                    if (powerLanes.length > 0) {
                        const types = ['MAGNET', 'SHIELD', 'JETPACK', 'MULTIPLIER', 'SPEED'];
                        this.createPowerUp(powerLanes[0], startZ + CONFIG.SEGMENT_LENGTH / 2, types[Math.floor(Math.random() * types.length)]);
                    }
                }
                
                this.lastZ = startZ;
            }

            createObstacle(type, lane, z, height) {
                const mesh = new THREE.Mesh(this.geometries[type], this.materials[type]);
                mesh.position.set(CONFIG.LANES[lane], height, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                this.scene.add(mesh);
                
                const box = new THREE.Box3().setFromObject(mesh);
                this.obstacles.push({ mesh, box, type, lane });
            }

            createTrain(lane, z) {
                const trainGroup = new THREE.Group();
                const isRed = Math.random() > 0.5;
                const mat = isRed ? this.materials.train1 : this.materials.train2;
                
                const body = new THREE.Mesh(this.geometries.trainBody, mat);
                body.position.y = 1.5;
                body.castShadow = true;
                trainGroup.add(body);
                
                const front = new THREE.Mesh(this.geometries.trainFront, mat);
                front.position.set(0, 1.5, 4);
                trainGroup.add(front);
                
                for (let i = -1; i <= 1; i++) {
                    const wheel = new THREE.Mesh(this.geometries.wheel, this.materials.rail);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(i * 2, 0.4, 0);
                    trainGroup.add(wheel);
                }
                
                const windowMat = new THREE.MeshStandardMaterial({ color: 0x87CEEB, roughness: 0.1, metalness: 0.5 });
                for (let i = -1; i <= 1; i++) {
                    for (let j = 0; j < 2; j++) {
                        const win = new THREE.Mesh(this.geometries.trainWindow, windowMat);
                        win.position.set(i * 0.9, 2.2, 4.05 + j * 0.01);
                        trainGroup.add(win);
                    }
                }
                
                trainGroup.position.set(CONFIG.LANES[lane], 0, z);
                this.scene.add(trainGroup);
                
                const box = new THREE.Box3().setFromObject(trainGroup);
                this.trains.push({ mesh: trainGroup, box, lane });
            }

            createCoin(lane, z, y) {
                const coinMat = new THREE.MeshStandardMaterial({
                    color: CONFIG.COLORS.COIN,
                    metalness: 0.9,
                    roughness: 0.1,
                    emissive: CONFIG.COLORS.COIN,
                    emissiveIntensity: 0.3
                });
                const mesh = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.1, 8, 24), coinMat);
                mesh.position.set(CONFIG.LANES[lane], y, z);
                mesh.castShadow = true;
                this.scene.add(mesh);
                
                const box = new THREE.Box3().setFromObject(mesh);
                this.coins.push({ mesh, box, collected: false, phase: Math.random() * Math.PI * 2 });
            }

            createPowerUp(lane, z, type) {
                const colors = {
                    MAGNET: 0x00BFFF,
                    SHIELD: 0x00FF7F,
                    JETPACK: 0xFF8C00,
                    MULTIPLIER: 0x9370DB,
                    SPEED: 0xFF1493
                };
                
                const group = new THREE.Group();
                const mesh = new THREE.Mesh(
                    new THREE.OctahedronGeometry(0.5, 0),
                    new THREE.MeshStandardMaterial({ color: colors[type], metalness: 0.7, roughness: 0.2, emissive: colors[type], emissiveIntensity: 0.5 })
                );
                group.add(mesh);
                
                const glow = new THREE.Mesh(
                    new THREE.SphereGeometry(0.7, 16, 16),
                    new THREE.MeshBasicMaterial({ color: colors[type], transparent: true, opacity: 0.2 })
                );
                group.add(glow);
                
                group.position.set(CONFIG.LANES[lane], 1.5, z);
                this.scene.add(group);
                
                const box = new THREE.Box3().setFromObject(group);
                this.powerUps.push({ mesh: group, box, type, collected: false });
            }

            update(playerZ, playerPos, hasMagnet, speed) {
                this.ground.position.z = playerZ - 500;
                
                while (this.lastZ > playerZ - 200) {
                    this.generateSegment(playerZ);
                }
                
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obs = this.obstacles[i];
                    obs.box.setFromObject(obs.mesh);
                    if (obs.mesh.position.z > playerZ + 20) {
                        this.scene.remove(obs.mesh);
                        this.obstacles.splice(i, 1);
                    }
                }
                
                for (let i = this.coins.length - 1; i >= 0; i--) {
                    const coin = this.coins[i];
                    const time = Date.now() * 0.003 + coin.phase;
                    coin.mesh.position.y = 1.5 + Math.sin(time) * 0.2;
                    coin.mesh.rotation.x += 0.1;
                    coin.box.setFromObject(coin.mesh);
                    
                    if (hasMagnet && !coin.collected) {
                        const dist = coin.mesh.position.distanceTo(playerPos);
                        if (dist < 12) {
                            coin.mesh.position.lerp(new THREE.Vector3(playerPos.x, playerPos.y + 1, playerPos.z), 0.12);
                        }
                    }
                    
                    if (coin.collected || coin.mesh.position.z > playerZ + 20) {
                        this.scene.remove(coin.mesh);
                        this.coins.splice(i, 1);
                    }
                }
                
                for (let i = this.powerUps.length - 1; i >= 0; i--) {
                    const pu = this.powerUps[i];
                    const time = Date.now() * 0.002;
                    pu.mesh.rotation.y += 0.03;
                    pu.mesh.position.y = 1.5 + Math.sin(time * 1.5) * 0.3;
                    pu.box.setFromObject(pu.mesh);
                    
                    if (pu.collected || pu.mesh.position.z > playerZ + 20) {
                        this.scene.remove(pu.mesh);
                        this.powerUps.splice(i, 1);
                    }
                }
                
                for (let i = this.trains.length - 1; i >= 0; i--) {
                    const train = this.trains[i];
                    train.box.setFromObject(train.mesh);
                    if (train.mesh.position.z > playerZ + 20) {
                        this.scene.remove(train.mesh);
                        this.trains.splice(i, 1);
                    }
                }
            }

            getObstacles() { return this.obstacles; }
            getCoins() { return this.coins; }
            getPowerUps() { return this.powerUps; }
            getTrains() { return this.trains; }

            clear() {
                this.obstacles.forEach(o => this.scene.remove(o.mesh));
                this.coins.forEach(c => this.scene.remove(c.mesh));
                this.powerUps.forEach(p => this.scene.remove(p.mesh));
                this.trains.forEach(t => this.scene.remove(t.mesh));
                this.obstacles = [];
                this.coins = [];
                this.powerUps = [];
                this.trains = [];
                this.lastZ = 0;
                this.segIndex = 0;
            }
        }

        class PowerUpManager {
            constructor() {
                this.powers = {
                    MAGNET: { active: false, timer: 0, duration: 8 },
                    SHIELD: { active: false, timer: 0, duration: 6 },
                    JETPACK: { active: false, timer: 0, duration: 5 },
                    MULTIPLIER: { active: false, timer: 0, duration: 10 },
                    SPEED: { active: false, timer: 0, duration: 6 }
                };
            }
            activate(type) {
                if (this.powers[type]) {
                    this.powers[type].active = true;
                    this.powers[type].timer = this.powers[type].duration;
                }
            }
            update(dt) {
                for (const t in this.powers) {
                    const p = this.powers[t];
                    if (p.active) {
                        p.timer -= dt;
                        if (p.timer <= 0) { p.active = false; p.timer = 0; }
                    }
                }
            }
            isActive(t) { return this.powers[t] && this.powers[t].active; }
            getMultiplier() { return this.isActive('MULTIPLIER') ? 2 : 1; }
            getSpeedBoost() { return this.isActive('SPEED') ? 1.4 : 1; }
            reset() { for (const t in this.powers) { this.powers[t].active = false; this.powers[t].timer = 0; } }
            getActive() {
                const icons = { MAGNET: '🧲', SHIELD: '🛡️', JETPACK: '🚀', MULTIPLIER: '✨', SPEED: '⚡' };
                const colors = { MAGNET: '#00BFFF', SHIELD: '#00FF7F', JETPACK: '#FF8C00', MULTIPLIER: '#9370DB', SPEED: '#FF1493' };
                return Object.entries(this.powers).filter(([_, d]) => d.active).map(([t, d]) => ({ type: t, timer: d.timer, icon: icons[t], color: colors[t] }));
            }
        }

        class ChaseSystem {
            constructor(scene) {
                this.scene = scene;
                this.active = false;
                this.timer = 0;
                this.duration = 120;
                this.group = new THREE.Group();
                
                const copMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.3 });
                const copBody = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 2.5), copMat);
                copBody.position.y = 1;
                this.group.add(copBody);
                
                const copHead = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshStandardMaterial({ color: 0xFFE4C4 }));
                copHead.position.y = 2.4;
                this.group.add(copHead);
                
                this.group.visible = false;
                this.scene.add(this.group);
            }

            start(playerZ) {
                this.active = true;
                this.timer = this.duration;
                this.group.visible = true;
                this.group.position.set(0, 0, playerZ + 25);
            }

            update(playerPos, dt) {
                if (!this.active) return;
                
                this.timer--;
                const targetZ = playerPos.z + 15 + (1 - this.timer / this.duration) * 10;
                this.group.position.z += (targetZ - this.group.position.z) * 0.1;
                this.group.position.x += (playerPos.x - this.group.position.x) * 0.05;
                this.group.rotation.y = Math.sin(Date.now() * 0.002) * 0.1;
                
                if (this.timer <= 0) return true;
                return false;
            }

            stop() {
                this.active = false;
                this.timer = 0;
                this.group.visible = false;
            }

            getBox() {
                const pos = this.group.position;
                return new THREE.Box3(
                    new THREE.Vector3(pos.x - 0.75, 0, pos.z - 1.25),
                    new THREE.Vector3(pos.x + 0.75, 2.5, pos.z + 1.25)
                );
            }
        }

        class ParticleSystem {
            constructor(scene) {
                this.scene = scene;
                this.particles = [];
                this.coinPopParticles = [];
            }

            emit(x, y, z, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
                    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), mat);
                    mesh.position.set(x, y, z);
                    this.scene.add(mesh);
                    this.particles.push({
                        mesh,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: Math.random() * 0.2 + 0.1,
                        vz: (Math.random() - 0.5) * 0.3,
                        life: 1
                    });
                }
            }

            emitCoinCollect(x, y, z) {
                for (let i = 0; i < 8; i++) {
                    const mat = new THREE.MeshBasicMaterial({ color: CONFIG.COLORS.COIN, transparent: true, opacity: 1 });
                    const mesh = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.03, 4, 8), mat);
                    mesh.position.set(x, y, z);
                    this.scene.add(mesh);
                    const angle = (i / 8) * Math.PI * 2;
                    this.coinPopParticles.push({
                        mesh,
                        vx: Math.cos(angle) * 0.15,
                        vy: 0.1,
                        vz: Math.sin(angle) * 0.15,
                        life: 1
                    });
                }
            }

            update() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.mesh.position.x += p.vx;
                    p.mesh.position.y += p.vy;
                    p.mesh.position.z += p.vz;
                    p.vy -= 0.01;
                    p.life -= 0.03;
                    p.mesh.material.opacity = p.life;
                    p.mesh.scale.setScalar(p.life);
                    if (p.life <= 0) {
                        this.scene.remove(p.mesh);
                        this.particles.splice(i, 1);
                    }
                }
                
                for (let i = this.coinPopParticles.length - 1; i >= 0; i--) {
                    const p = this.coinPopParticles[i];
                    p.mesh.position.x += p.vx;
                    p.mesh.position.y += p.vy;
                    p.mesh.position.z += p.vz;
                    p.life -= 0.05;
                    p.mesh.material.opacity = p.life;
                    if (p.life <= 0) {
                        this.scene.remove(p.mesh);
                        this.coinPopParticles.splice(i, 1);
                    }
                }
            }
        }

        class UI {
            constructor() {
                this.scoreEl = document.getElementById('score');
                this.coinEl = document.getElementById('coinCount');
                this.levelEl = document.getElementById('level');
                this.multBox = document.getElementById('multiplierBox');
                this.multEl = document.getElementById('multiplier');
                this.powerUpsEl = document.getElementById('powerups');
                this.msgEl = document.getElementById('msg');
                this.nearMissEl = document.getElementById('nearMiss');
                this.menuEl = document.getElementById('menu');
                this.gameOverEl = document.getElementById('gameOver');
                this.hudEl = document.getElementById('hud');
                this.finalScoreEl = document.getElementById('finalScore');
                this.finalCoinsEl = document.getElementById('finalCoins');
                this.finalDistEl = document.getElementById('finalDistance');
                this.chaseOverlay = document.getElementById('chaseOverlay');
                this.speedLines = document.getElementById('speedLines');
            }

            showMenu() {
                this.menuEl.classList.remove('hidden');
                this.gameOverEl.classList.add('hidden');
                this.hudEl.classList.add('hidden');
                this.powerUpsEl.innerHTML = '';
            }
            hideMenu() { this.menuEl.classList.add('hidden'); this.hudEl.classList.remove('hidden'); }
            showGameOver(score, coins, dist) {
                this.gameOverEl.classList.remove('hidden');
                this.finalScoreEl.innerText = Math.floor(score);
                this.finalCoinsEl.innerText = coins;
                this.finalDistEl.innerText = Math.floor(dist);
            }
            hideGameOver() { this.gameOverEl.classList.add('hidden'); }

            updateScore(s) { this.scoreEl.innerText = Math.floor(s); }
            updateCoins(c) { this.coinEl.innerText = c; }
            updateLevel(l) { this.levelEl.innerText = l; }

            updatePowerUps(active) {
                this.powerUpsEl.innerHTML = '';
                active.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'power-timer';
                    div.style.background = p.color;
                    div.innerHTML = `<span class="power-icon">${p.icon}</span><span>${Math.ceil(p.timer)}s</span>`;
                    this.powerUpsEl.appendChild(div);
                });
            }

            updateMultiplier(mult) {
                if (mult > 1) {
                    this.multBox.style.display = 'block';
                    this.multEl.innerText = mult;
                } else {
                    this.multBox.style.display = 'none';
                }
            }

            showMessage(text) {
                this.msgEl.innerText = text;
                this.msgEl.classList.add('show-msg');
                setTimeout(() => this.msgEl.classList.remove('show-msg'), 800);
            }

            showNearMiss(text = 'CLOSE! +50') {
                this.nearMissEl.innerText = text;
                this.nearMissEl.classList.add('show-nearmiss');
                setTimeout(() => this.nearMissEl.classList.remove('show-nearmiss'), 500);
            }

            showChase(active) {
                if (active) this.chaseOverlay.classList.add('chase-active');
                else this.chaseOverlay.classList.remove('chase-active');
            }

            emitSpeedLine() {
                const line = document.createElement('div');
                line.className = 'speed-line';
                line.style.left = Math.random() * 100 + '%';
                line.style.animationDuration = (0.2 + Math.random() * 0.2) + 's';
                this.speedLines.appendChild(line);
                setTimeout(() => line.remove(), 400);
            }
        }

        class Game {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(CONFIG.COLORS.SKY);
                this.scene.fog = new THREE.Fog(CONFIG.COLORS.SKY, 50, 150);
                
                this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 6, 12);
                
                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                this.createLights();
                
                this.player = new Player(this.scene);
                player = this.player;
                this.obstacles = new ObstacleManager(this.scene);
                this.powerUps = new PowerUpManager();
                this.chase = new ChaseSystem(this.scene);
                this.particles = new ParticleSystem(this.scene);
                this.ui = new UI();
                
                this.state = GameState.MENU;
                this.score = 0;
                this.coins = 0;
                this.distance = 0;
                this.level = 1;
                this.speed = CONFIG.INITIAL_SPEED;
                this.lastTime = performance.now();
                this.cameraShake = 0;
                
                this.setupInput();
                this.setupMobile();
                window.addEventListener('resize', () => this.onResize());
                
                this.ui.showMenu();
                this.loop();
            }

            createLights() {
                const ambient = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(ambient);
                
                const sun = new THREE.DirectionalLight(0xFFFF99, 1);
                sun.position.set(50, 100, 50);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 2048;
                sun.shadow.mapSize.height = 2048;
                sun.shadow.camera.near = 0.5;
                sun.shadow.camera.far = 500;
                sun.shadow.camera.left = -50;
                sun.shadow.camera.right = 50;
                sun.shadow.camera.top = 50;
                sun.shadow.camera.bottom = -50;
                this.scene.add(sun);
                
                const fill = new THREE.DirectionalLight(0x87CEEB, 0.3);
                fill.position.set(-30, 20, -30);
                this.scene.add(fill);
            }

            setupInput() {
                document.addEventListener('keydown', e => {
                    if (this.state === GameState.MENU || this.state === GameState.GAME_OVER) {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); this.start(); }
                        return;
                    }
                    if (this.state === GameState.PLAYING || this.state === GameState.CHASE) {
                        switch (e.key) {
                            case 'ArrowLeft': case 'a': case 'A': this.player.moveLeft(); break;
                            case 'ArrowRight': case 'd': case 'D': this.player.moveRight(); break;
                            case 'ArrowUp': case 'w': case 'W': case ' ': e.preventDefault(); this.player.jump(); break;
                            case 'ArrowDown': case 's': case 'S': this.player.slide(); break;
                        }
                    }
                });
                
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('retryBtn').addEventListener('click', () => this.start());
                document.getElementById('menuBtn').addEventListener('click', () => this.showMenu());
            }

            setupMobile() {
                const handle = (fn) => {
                    if (this.state === GameState.PLAYING || this.state === GameState.CHASE) fn();
                };
                document.getElementById('leftBtn').addEventListener('touchstart', e => { e.preventDefault(); handle(() => this.player.moveLeft()); });
                document.getElementById('rightBtn').addEventListener('touchstart', e => { e.preventDefault(); handle(() => this.player.moveRight()); });
                document.getElementById('jumpBtn').addEventListener('touchstart', e => { e.preventDefault(); handle(() => this.player.jump()); });
                document.getElementById('slideBtn').addEventListener('touchstart', e => { e.preventDefault(); handle(() => this.player.slide()); });
            }

            start() {
                this.state = GameState.PLAYING;
                this.score = 0;
                this.coins = 0;
                this.distance = 0;
                this.level = 1;
                this.speed = CONFIG.INITIAL_SPEED;
                this.cameraShake = 0;
                
                this.player.reset();
                this.obstacles.clear();
                this.powerUps.reset();
                this.chase.stop();
                
                for (let i = 0; i < 5; i++) this.obstacles.generateSegment(0);
                
                this.ui.hideMenu();
                this.ui.hideGameOver();
                this.ui.showChase(false);
            }

            showMenu() {
                this.state = GameState.MENU;
                this.chase.stop();
                this.ui.showMenu();
            }

            gameOver() {
                this.state = GameState.GAME_OVER;
                if (this.player.invincible) this.player.deactivateShield();
                if (this.player.isFlying) this.player.deactivateJetpack();
                this.chase.stop();
                this.ui.showChase(false);
                this.ui.showGameOver(this.score, this.coins, this.distance);
            }

            startChase() {
                this.state = GameState.CHASE;
                this.chase.start(this.player.getPosition().z);
                this.ui.showChase(true);
                this.ui.showMessage('RUN!');
            }

            collectCoin(coin) {
                const mult = this.powerUps.getMultiplier();
                this.coins++;
                this.score += 10 * mult;
                this.particles.emitCoinCollect(coin.mesh.position.x, coin.mesh.position.y, coin.mesh.position.z);
            }

            collectPowerUp(type) {
                const msgs = {
                    MAGNET: 'MAGNET!',
                    SHIELD: 'SHIELD!',
                    JETPACK: 'JETPACK!',
                    MULTIPLIER: '2X SCORE!',
                    SPEED: 'SPEED BOOST!'
                };
                this.ui.showMessage(msgs[type]);
                this.powerUps.activate(type);
                this.particles.emit(
                    this.player.getPosition().x,
                    this.player.getPosition().y + 1,
                    this.player.getPosition().z,
                    0xFFD700, 20
                );
                
                if (type === 'SHIELD') this.player.activateShield();
                if (type === 'JETPACK') this.player.activateJetpack();
            }

            checkCollisions() {
                const pBox = this.player.box;
                const pPos = this.player.getPosition();
                
                for (const obs of this.obstacles.getObstacles()) {
                    if (pBox.intersectsBox(obs.box)) {
                        if (this.player.invincible) continue;
                        if (this.player.isFlying) continue;
                        if (obs.type === 'barrel' || obs.type === 'cone') {
                            if (pPos.y > 1) continue;
                            if (this.player.getNearMiss() && pPos.y < 0.5) {
                                this.ui.showNearMiss('CLOSE!');
                                this.score += 50;
                                continue;
                            }
                            this.startChase();
                            return;
                        }
                        if (obs.type === 'block') {
                            if (this.player.getNearMiss() && Math.abs(pPos.x - CONFIG.LANES[obs.lane]) < 1.5) {
                                this.ui.showNearMiss('NEAR MISS! +100');
                                this.score += 100;
                                continue;
                            }
                            this.startChase();
                            return;
                        }
                    }
                }
                
                for (const train of this.obstacles.getTrains()) {
                    if (pBox.intersectsBox(train.box)) {
                        if (this.player.invincible || this.player.isFlying) continue;
                        this.startChase();
                        return;
                    }
                }
                
                for (const coin of this.obstacles.getCoins()) {
                    if (!coin.collected && pBox.intersectsBox(coin.box)) {
                        coin.collected = true;
                        this.collectCoin(coin);
                    }
                }
                
                for (const pu of this.obstacles.getPowerUps()) {
                    if (!pu.collected && pBox.intersectsBox(pu.box)) {
                        pu.collected = true;
                        this.collectPowerUp(pu.type);
                    }
                }
            }

            update() {
                const now = performance.now();
                const delta = Math.min((now - this.lastTime) / 1000, 0.1);
                this.lastTime = now;
                
                if (this.state !== GameState.PLAYING && this.state !== GameState.CHASE) return;
                
                const speedBoost = this.powerUps.getSpeedBoost();
                const currentSpeed = this.speed * speedBoost;
                
                this.player.mesh.position.z -= currentSpeed;
                this.distance += currentSpeed;
                
                this.powerUps.update(delta);
                
                if (this.powerUps.isActive('JETPACK') !== this.player.isFlying) {
                    if (this.powerUps.isActive('JETPACK')) this.player.activateJetpack();
                    else this.player.deactivateJetpack();
                }
                if (this.powerUps.isActive('SHIELD') !== this.player.invincible) {
                    if (this.powerUps.isActive('SHIELD')) this.player.activateShield();
                    else this.player.deactivateShield();
                }
                
                if (this.state === GameState.CHASE) {
                    const chaseEnd = this.chase.update(this.player.getPosition(), delta);
                    if (chaseEnd) this.gameOver();
                    if (this.player.box.intersectsBox(this.chase.getBox())) this.gameOver();
                }
                
                this.player.update(delta, currentSpeed);
                this.obstacles.update(
                    this.player.mesh.position.z,
                    this.player.mesh.position,
                    this.powerUps.isActive('MAGNET'),
                    currentSpeed
                );
                this.checkCollisions();
                this.particles.update();
                
                const newLevel = Math.floor(this.distance / 300) + 1;
                if (newLevel > this.level) {
                    this.level = newLevel;
                    this.speed = Math.min(CONFIG.MAX_SPEED, CONFIG.INITIAL_SPEED + (this.level - 1) * 0.1);
                    this.ui.showMessage(`LEVEL ${this.level}!`);
                }
                
                const mult = this.powerUps.getMultiplier();
                this.score += currentSpeed * mult * 0.5;
                
                this.ui.updateScore(this.score);
                this.ui.updateCoins(this.coins);
                this.ui.updateLevel(this.level);
                this.ui.updatePowerUps(this.powerUps.getActive());
                this.ui.updateMultiplier(mult);
                
                if (Math.random() < currentSpeed * 0.3) this.ui.emitSpeedLine();
                
                const camTargetX = this.player.mesh.position.x * 0.3;
                const camTargetZ = this.player.mesh.position.z + 12;
                const camTargetY = this.player.isFlying ? 10 : 6;
                
                if (this.state === GameState.CHASE) {
                    this.cameraShake = 0.3;
                } else {
                    this.cameraShake *= 0.9;
                }
                
                this.camera.position.x += (camTargetX - this.camera.position.x) * 0.1 + (Math.random() - 0.5) * this.cameraShake;
                this.camera.position.y += (camTargetY - this.camera.position.y) * 0.1 + (Math.random() - 0.5) * this.cameraShake;
                this.camera.position.z += (camTargetZ - this.camera.position.z) * 0.1;
                
                const tilt = (this.player.mesh.position.x - this.camera.position.x) * 0.02;
                this.camera.lookAt(
                    this.player.mesh.position.x * 0.5,
                    2,
                    this.player.mesh.position.z - 10
                );
                this.camera.rotation.z = tilt;
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            loop() {
                requestAnimationFrame(() => this.loop());
                this.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        new Game();
    })();
    </script>
