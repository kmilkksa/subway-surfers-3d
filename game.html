<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway Surfers 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Poppins', sans-serif; background: #87CEEB; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; color: white; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(180deg, #FF6B35 0%, #F7931E 100%); pointer-events: auto; }
        .hidden { display: none !important; }
        
        h1 { font-family: 'Bangers', cursive; font-size: clamp(4rem, 15vw, 8rem); color: #fff; text-shadow: 4px 4px 0 #CC4400; animation: bounce 1s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .btn { padding: 1.2rem 3rem; font-family: 'Bangers', cursive; font-size: 2rem; border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; }
        .btn-play { background: #4CAF50; color: white; box-shadow: 0 6px 0 #2E7D32; }
        .btn-play:hover { transform: translateY(-2px); }
        .btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 #2E7D32; }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; }
        .stat { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 25px; font-size: 1.3rem; font-weight: bold; }
        
        #msg { position: absolute; top: 35%; width: 100%; text-align: center; font-family: 'Bangers', cursive; font-size: 4rem; color: #FFD700; opacity: 0; transition: 0.3s; }
        .show { opacity: 1; transform: scale(1.2); }
        
        #powerups { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .power { padding: 10px 15px; border-radius: 20px; font-weight: bold; }
        
        #mobileControls { position: absolute; bottom: 100px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 20px; pointer-events: auto; }
        .mobile-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; font-size: 2rem; }
        @media (max-width: 768px) { #mobileControls { display: flex; } }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="menu" class="screen">
            <h1>SURF RUSH</h1>
            <button class="btn btn-play" id="startBtn">PLAY</button>
        </div>
        
        <div id="hud" class="hidden">
            <div class="stat">SCORE: <span id="score">0</span></div>
            <div class="stat">COINS: <span id="coins">0</span></div>
        </div>
        
        <div id="msg">POWER UP!</div>
        <div id="powerups"></div>
        
        <div id="mobileControls">
            <button class="mobile-btn" id="leftBtn">◀</button>
            <button class="mobile-btn" id="rightBtn">▶</button>
            <button class="mobile-btn" id="jumpBtn">▲</button>
            <button class="mobile-btn" id="slideBtn">▼</button>
        </div>
        
        <div id="gameOver" class="screen hidden">
            <h1>GAME OVER</h1>
            <p style="font-size: 2rem; margin: 1rem;">Score: <span id="finalScore">0</span></p>
            <button class="btn btn-play" id="retryBtn">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function() {
        const LANES = [-3.5, 0, 3.5];
        const JUMP_FORCE = 0.4;
        const GRAVITY = 0.02;
        const SPEED = 0.8;
        
        let scene, camera, renderer;
        let player, obstacles = [], coins = [], powerUps = [];
        let state = 'MENU', score = 0, coinsCount = 0;
        let playerLane = 1, playerY = 0, velocityY = 0, isJumping = false, isSliding = false;
        let powerUpActive = { SHIELD: false, JETPACK: false, MAGNET: false, MULTI: false, SPEED: false };
        let slideTimer = 0, shieldTimer = 0, jetpackTimer = 0, magnetTimer = 0, multiTimer = 0, speedTimer = 0;
        let lastTime = 0;
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 30, 100);
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);
            
            createGround();
            createPlayer();
            
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('retryBtn').addEventListener('click', startGame);
            document.getElementById('leftBtn').addEventListener('touchstart', function(e) { e.preventDefault(); moveLeft(); });
            document.getElementById('rightBtn').addEventListener('touchstart', function(e) { e.preventDefault(); moveRight(); });
            document.getElementById('jumpBtn').addEventListener('touchstart', function(e) { e.preventDefault(); jump(); });
            document.getElementById('slideBtn').addEventListener('touchstart', function(e) { e.preventDefault(); slide(); });
            
            document.addEventListener('keydown', function(e) {
                if (state === 'MENU' || state === 'GAMEOVER') { if (e.key === ' ' || e.key === 'Enter') startGame(); return; }
                if (state === 'PLAYING') {
                    if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
                    if (e.key === 'ArrowRight' || e.key === 'd') moveRight();
                    if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') jump();
                    if (e.key === 'ArrowDown' || e.key === 's') slide();
                }
            });
            
            window.addEventListener('resize', function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            loop(0);
        }
        
        function createGround() {
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 2000),
                new THREE.MeshStandardMaterial({ color: 0x8B4513 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            for (let i = 0; i < 3; i++) {
                const track = new THREE.Mesh(
                    new THREE.PlaneGeometry(3.5, 2000),
                    new THREE.MeshStandardMaterial({ color: 0x555555 })
                );
                track.rotation.x = -Math.PI / 2;
                track.position.set(LANES[i], 0.01, -500);
                scene.add(track);
            }
        }
        
        function createPlayer() {
            player = new THREE.Group();
            
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xFFE4C4 })
            );
            head.position.y = 1.7;
            player.add(head);
            
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 0.8, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xFF4444 })
            );
            body.position.y = 1.1;
            player.add(body);
            
            const leftLeg = new THREE.Mesh(
                new THREE.BoxGeometry(0.25, 0.6, 0.25),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            leftLeg.position.set(-0.2, 0.3, 0);
            player.add(leftLeg);
            
            const rightLeg = leftLeg.clone();
            rightLeg.position.set(0.2, 0.3, 0);
            player.add(rightLeg);
            
            player.position.set(LANES[1], 0, 0);
            scene.add(player);
        }
        
        function createObstacle(lane, z, type) {
            let geo, height;
            if (type === 'LOW') {
                geo = new THREE.BoxGeometry(3, 0.8, 1.5);
                height = 0.4;
            } else if (type === 'HIGH') {
                geo = new THREE.BoxGeometry(3, 2.5, 1.5);
                height = 1.25;
            } else {
                geo = new THREE.BoxGeometry(3, 4, 1.5);
                height = 2;
            }
            
            const mesh = new THREE.Mesh(
                geo,
                new THREE.MeshStandardMaterial({ 
                    color: type === 'LOW' ? 0xFF6600 : type === 'HIGH' ? 0x00CED1 : 0xDC143C 
                })
            );
            mesh.position.set(LANES[lane], height, z);
            mesh.castShadow = true;
            scene.add(mesh);
            
            obstacles.push({ mesh: mesh, type: type, lane: lane });
        }
        
        function createCoin(lane, z) {
            const mesh = new THREE.Mesh(
                new THREE.TorusGeometry(0.3, 0.1, 8, 24),
                new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8 })
            );
            mesh.position.set(LANES[lane], 1.5, z);
            scene.add(mesh);
            coins.push({ mesh: mesh, collected: false });
        }
        
        function createPowerUp(lane, z) {
            const types = ['SHIELD', 'JETPACK', 'MAGNET', 'MULTI', 'SPEED'];
            const type = types[Math.floor(Math.random() * types.length)];
            const colors = { SHIELD: 0x00FF7F, JETPACK: 0xFF8C00, MAGNET: 0x00BFFF, MULTI: 0x9370DB, SPEED: 0xFF1493 };
            
            const mesh = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.5),
                new THREE.MeshStandardMaterial({ color: colors[type], emissive: colors[type], emissiveIntensity: 0.5 })
            );
            mesh.position.set(LANES[lane], 1.5, z);
            scene.add(mesh);
            powerUps.push({ mesh: mesh, type: type, collected: false });
        }
        
        function generateSegment() {
            const startZ = obstacles.length > 0 ? Math.min.apply(null, obstacles.map(function(o) { return o.mesh.position.z; })) - 30 : -30;
            
            const occupied = [];
            const numObs = 2 + Math.floor(Math.random() * 2);
            
            for (let i = 0; i < numObs; i++) {
                const avail = [0, 1, 2].filter(function(l) { return occupied.indexOf(l) === -1; });
                if (avail.length === 0) break;
                
                const lane = avail[Math.floor(Math.random() * avail.length)];
                occupied.push(lane);
                
                const types = ['LOW', 'HIGH', 'BLOCK'];
                const type = types[Math.floor(Math.random() * types.length)];
                createObstacle(lane, startZ - i * 15, type);
                
                if (Math.random() > 0.4) {
                    const coinLane = [0, 1, 2].filter(function(l) { return occupied.indexOf(l) === -1; });
                    if (coinLane.length > 0) {
                        const cLane = coinLane[Math.floor(Math.random() * coinLane.length)];
                        for (let c = 0; c < 5; c++) {
                            createCoin(cLane, startZ - i * 15 - 5 - c * 2);
                        }
                    }
                }
            }
            
            if (Math.random() > 0.7) {
                const lane = [0, 1, 2][Math.floor(Math.random() * 3)];
                createPowerUp(lane, startZ - 15);
            }
        }
        
        function startGame() {
            state = 'PLAYING';
            score = 0;
            coinsCount = 0;
            playerLane = 1;
            playerY = 0;
            velocityY = 0;
            isJumping = false;
            isSliding = false;
            
            for (let i = 0; i < obstacles.length; i++) {
                scene.remove(obstacles[i].mesh);
            }
            for (let i = 0; i < coins.length; i++) {
                scene.remove(coins[i].mesh);
            }
            for (let i = 0; i < powerUps.length; i++) {
                scene.remove(powerUps[i].mesh);
            }
            obstacles = [];
            coins = [];
            powerUps = [];
            
            for (var k in powerUpActive) powerUpActive[k] = false;
            
            player.position.set(LANES[1], 0, 0);
            
            for (let i = 0; i < 5; i++) generateSegment();
            
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
        }
        
        function gameOver() {
            state = 'GAMEOVER';
            document.getElementById('gameOver').classList.remove('hidden');
            document.getElementById('finalScore').innerText = Math.floor(score);
        }
        
        function moveLeft() { if (playerLane > 0) playerLane--; }
        function moveRight() { if (playerLane < 2) playerLane++; }
        
        function jump() {
            if (!isJumping && !isSliding) {
                velocityY = JUMP_FORCE;
                isJumping = true;
            }
        }
        
        function slide() {
            if (!isSliding && !isJumping) {
                isSliding = true;
                slideTimer = 30;
            }
        }
        
        function showMessage(text) {
            var msg = document.getElementById('msg');
            msg.innerText = text;
            msg.classList.add('show');
            setTimeout(function() { msg.classList.remove('show'); }, 800);
        }
        
        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('coins').innerText = coinsCount;
            
            var container = document.getElementById('powerups');
            container.innerHTML = '';
            
            var icons = { SHIELD: '🛡️', JETPACK: '🚀', MAGNET: '🧲', MULTI: 'x2', SPEED: '⚡' };
            var colors = { SHIELD: '#00FF7F', JETPACK: '#FF8C00', MAGNET: '#00BFFF', MULTI: '#9370DB', SPEED: '#FF1493' };
            
            for (var type in powerUpActive) {
                if (powerUpActive[type]) {
                    var div = document.createElement('div');
                    div.className = 'power';
                    div.style.background = colors[type];
                    div.innerHTML = icons[type];
                    container.appendChild(div);
                }
            }
        }
        
        function getPlayerBox() {
            var h = isSliding ? 0.8 : 2;
            var y = isSliding ? 0.4 : 1;
            return new THREE.Box3(
                new THREE.Vector3(player.position.x - 0.4, y - h/2, player.position.z - 0.3),
                new THREE.Vector3(player.position.x + 0.4, y + h/2, player.position.z + 0.3)
            );
        }
        
        function loop(time) {
            requestAnimationFrame(loop);
            
            var delta = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;
            
            if (state === 'PLAYING') {
                var currentSpeed = SPEED * (powerUpActive.SPEED ? 1.5 : 1);
                
                player.position.z -= currentSpeed;
                score += currentSpeed * 0.5 * (powerUpActive.MULTI ? 2 : 1);
                
                var targetX = LANES[playerLane];
                player.position.x += (targetX - player.position.x) * 0.3;
                
                if (isJumping) {
                    velocityY -= GRAVITY;
                    playerY += velocityY;
                    if (playerY <= 0) {
                        playerY = 0;
                        velocityY = 0;
                        isJumping = false;
                    }
                    player.position.y = playerY;
                }
                
                if (isSliding) {
                    slideTimer--;
                    if (slideTimer <= 0) isSliding = false;
                }
                
                if (powerUpActive.JETPACK) {
                    player.position.y = 5;
                } else if (!isJumping) {
                    player.position.y = playerY;
                }
                
                while (obstacles.length === 0 || Math.min.apply(null, obstacles.map(function(o) { return o.mesh.position.z; })) > player.position.z - 100) {
                    generateSegment();
                }
                
                var playerBox = getPlayerBox();
                
                for (var i = obstacles.length - 1; i >= 0; i--) {
                    var obs = obstacles[i];
                    var obsBox = new THREE.Box3().setFromObject(obs.mesh);
                    
                    if (obs.mesh.position.z > player.position.z + 20) {
                        scene.remove(obs.mesh);
                        obstacles.splice(i, 1);
                        continue;
                    }
                    
                    if (playerBox.intersectsBox(obsBox)) {
                        if (powerUpActive.SHIELD) {
                            powerUpActive.SHIELD = false;
                            showMessage('SHIELD BROKEN!');
                            scene.remove(obs.mesh);
                            obstacles.splice(i, 1);
                            continue;
                        }
                        if (powerUpActive.JETPACK) continue;
                        if (obs.type === 'LOW' && playerY > 0.8) continue;
                        if (obs.type === 'HIGH' && isSliding) continue;
                        gameOver();
                        return;
                    }
                }
                
                for (var i = coins.length - 1; i >= 0; i--) {
                    var coin = coins[i];
                    coin.mesh.rotation.x += 0.1;
                    
                    if (powerUpActive.MAGNET) {
                        var dist = coin.mesh.position.distanceTo(player.position);
                        if (dist < 10) {
                            coin.mesh.position.lerp(player.position, 0.1);
                        }
                    }
                    
                    var coinBox = new THREE.Box3().setFromObject(coin.mesh);
                    if (!coin.collected && playerBox.intersectsBox(coinBox)) {
                        coin.collected = true;
                        coinsCount++;
                        score += 10 * (powerUpActive.MULTI ? 2 : 1);
                        scene.remove(coin.mesh);
                        coins.splice(i, 1);
                    } else if (coin.mesh.position.z > player.position.z + 20 || coin.collected) {
                        scene.remove(coin.mesh);
                        coins.splice(i, 1);
                    }
                }
                
                for (var i = powerUps.length - 1; i >= 0; i--) {
                    var pu = powerUps[i];
                    pu.mesh.rotation.y += 0.03;
                    
                    if (pu.mesh.position.z > player.position.z + 20 || pu.collected) {
                        scene.remove(pu.mesh);
                        powerUps.splice(i, 1);
                        continue;
                    }
                    
                    var puBox = new THREE.Box3().setFromObject(pu.mesh);
                    if (!pu.collected && playerBox.intersectsBox(puBox)) {
                        pu.collected = true;
                        powerUpActive[pu.type] = true;
                        scene.remove(pu.mesh);
                        powerUps.splice(i, 1);
                        
                        var msgs = { SHIELD: 'SHIELD!', JETPACK: 'JETPACK!', MAGNET: 'MAGNET!', MULTI: '2X SCORE!', SPEED: 'SPEED BOOST!' };
                        showMessage(msgs[pu.type]);
                    }
                }
                
                if (powerUpActive.SHIELD && shieldTimer++ > 360) powerUpActive.SHIELD = false;
                if (powerUpActive.JETPACK && jetpackTimer++ > 300) powerUpActive.JETPACK = false;
                if (powerUpActive.MAGNET && magnetTimer++ > 480) powerUpActive.MAGNET = false;
                if (powerUpActive.MULTI && multiTimer++ > 600) powerUpActive.MULTI = false;
                if (powerUpActive.SPEED && speedTimer++ > 360) powerUpActive.SPEED = false;
                
                updateUI();
                
                camera.position.z = player.position.z + 12;
                camera.position.y = powerUpActive.JETPACK ? 12 : 6;
                camera.position.x += (player.position.x * 0.3 - camera.position.x) * 0.1;
                camera.lookAt(player.position.x, 2, player.position.z - 10);
            }
            
            renderer.render(scene, camera);
        }
        
        init();
    })();
    </script>
</body>
</html>
