<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway Surfers 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Poppins', sans-serif; background: #87CEEB; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; color: white; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(180deg, #FF6B35 0%, #F7931E 100%); pointer-events: auto; }
        .hidden { display: none !important; }
        
        h1 { font-family: 'Bangers', cursive; font-size: clamp(4rem, 15vw, 8rem); color: #fff; text-shadow: 4px 4px 0 #CC4400; animation: bounce 1s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .btn { padding: 1.2rem 3rem; font-family: 'Bangers', cursive; font-size: 2rem; border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; }
        .btn-play { background: #4CAF50; color: white; box-shadow: 0 6px 0 #2E7D32; }
        .btn-play:hover { transform: translateY(-2px); }
        .btn-play:active { transform: translateY(4px); }
        
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; }
        .stat { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 25px; font-size: 1.3rem; font-weight: bold; }
        
        #msg { position: absolute; top: 35%; width: 100%; text-align: center; font-family: 'Bangers', cursive; font-size: 4rem; color: #FFD700; opacity: 0; transition: 0.3s; }
        .show { opacity: 1; transform: scale(1.2); }
        
        #powerups { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .power { padding: 10px 15px; border-radius: 20px; font-weight: bold; animation: pulse 0.3s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        #mobileControls { position: absolute; bottom: 100px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 20px; pointer-events: auto; }
        .mobile-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; font-size: 2rem; }
        @media (max-width: 768px) { #mobileControls { display: flex; } }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="menu" class="screen">
            <h1>SUBWAY SURF</h1>
            <p style="font-size: 1.2rem; margin-bottom: 1rem;">Classic Endless Runner</p>
            <button class="btn btn-play" id="startBtn">PLAY</button>
        </div>
        
        <div id="hud" class="hidden">
            <div class="stat">SCORE: <span id="score">0</span></div>
            <div class="stat">COINS: <span id="coins">0</span></div>
        </div>
        
        <div id="msg">GO!</div>
        <div id="powerups"></div>
        
        <div id="mobileControls">
            <button class="mobile-btn" id="leftBtn">◀</button>
            <button class="mobile-btn" id="rightBtn">▶</button>
            <button class="mobile-btn" id="jumpBtn">▲</button>
            <button class="mobile-btn" id="slideBtn">▼</button>
        </div>
        
        <div id="gameOver" class="screen hidden">
            <h1>GAME OVER</h1>
            <p style="font-size: 2rem; margin: 1rem;">Score: <span id="finalScore">0</span></p>
            <button class="btn btn-play" id="retryBtn">RETRY</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function() {
        'use strict';
        
        var LANES = [-3.5, 0, 3.5];
        var BASE_SPEED = 0.6;
        var JUMP_FORCE = 0.35;
        var GRAVITY = 0.016;
        
        var scene, camera, renderer;
        var player, playerLane = 1, playerY = 0, velocityY = 0;
        var isJumping = false, isSliding = false, isFlying = false;
        var slideTimer = 0;
        
        var obstacles = [], coins = [], powerUps = [];
        var buildings = [], trains = [];
        
        var state = 'MENU', score = 0, coinsCount = 0;
        var speed = BASE_SPEED, level = 1;
        var lastTime = 0;
        
        var powerUpsActive = { SHIELD: false, JETPACK: false, MAGNET: false, MULTI: false, SPEED: false };
        var powerTimers = { SHIELD: 0, JETPACK: 0, MAGNET: 0, MULTI: 0, SPEED: 0 };
        
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 30, 120);
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 12);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            var ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            
            var sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            scene.add(sun);
            
            createGround();
            createPlayer();
            createEnvironment();
            generateWorld();
            
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('retryBtn').addEventListener('click', startGame);
            
            document.getElementById('leftBtn').addEventListener('touchstart', function(e) { e.preventDefault(); moveLeft(); });
            document.getElementById('rightBtn').addEventListener('touchstart', function(e) { e.preventDefault(); moveRight(); });
            document.getElementById('jumpBtn').addEventListener('touchstart', function(e) { e.preventDefault(); jump(); });
            document.getElementById('slideBtn').addEventListener('touchstart', function(e) { e.preventDefault(); slide(); });
            
            document.addEventListener('keydown', function(e) {
                if (state === 'MENU' || state === 'GAMEOVER') { 
                    if (e.key === ' ' || e.key === 'Enter') startGame(); 
                    return; 
                }
                if (state === 'PLAYING') {
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft();
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight();
                    if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w' || e.key === 'W') { e.preventDefault(); jump(); }
                    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') slide();
                }
            });
            
            window.addEventListener('resize', function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            loop(0);
        }
        
        function createGround() {
            var ground = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 2000),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            for (var i = 0; i < 3; i++) {
                var track = new THREE.Mesh(
                    new THREE.PlaneGeometry(3.5, 2000),
                    new THREE.MeshStandardMaterial({ color: 0x555555 })
                );
                track.rotation.x = -Math.PI / 2;
                track.position.set(LANES[i], 0.01, -500);
                scene.add(track);
            }
        }
        
        function createEnvironment() {
            for (var z = 0; z > -1000; z -= 20) {
                createBuildingPair(z);
            }
        }
        
        function createBuildingPair(z) {
            var h1 = 15 + Math.random() * 20;
            var b1 = new THREE.Mesh(
                new THREE.BoxGeometry(10, h1, 10),
                new THREE.MeshStandardMaterial({ color: 0x666666 })
            );
            b1.position.set(-14, h1/2, z);
            b1.castShadow = true;
            scene.add(b1);
            buildings.push(b1);
            
            var h2 = 15 + Math.random() * 20;
            var b2 = new THREE.Mesh(
                new THREE.BoxGeometry(10, h2, 10),
                new THREE.MeshStandardMaterial({ color: 0x777777 })
            );
            b2.position.set(14, h2/2, z);
            b2.castShadow = true;
            scene.add(b2);
            buildings.push(b2);
        }
        
        function createPlayer() {
            player = new THREE.Group();
            
            var head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xFFE4C4 })
            );
            head.position.y = 1.7;
            head.castShadow = true;
            player.add(head);
            
            var body = new THREE.Mesh(
                new THREE.BoxGeometry(0.7, 0.8, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xFF4444 })
            );
            body.position.y = 1.1;
            body.castShadow = true;
            player.add(body);
            
            var leftLeg = new THREE.Mesh(
                new THREE.BoxGeometry(0.25, 0.6, 0.25),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            leftLeg.position.set(-0.2, 0.3, 0);
            player.add(leftLeg);
            
            var rightLeg = leftLeg.clone();
            rightLeg.position.set(0.2, 0.3, 0);
            player.add(rightLeg);
            
            player.position.set(LANES[1], 0, 0);
            scene.add(player);
        }
        
        function createObstacle(type, lane, z) {
            var mesh, height;
            
            if (type === 'LOW') {
                mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 0.8, 1.5),
                    new THREE.MeshStandardMaterial({ color: 0xFF6600 })
                );
                height = 0.4;
            } else if (type === 'HIGH') {
                mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 2.5, 1.5),
                    new THREE.MeshStandardMaterial({ color: 0x00CED1 })
                );
                height = 3.75;
            } else {
                mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 4.5, 1.5),
                    new THREE.MeshStandardMaterial({ color: 0xDC143C })
                );
                height = 2.25;
            }
            
            mesh.position.set(LANES[lane], height, z);
            mesh.castShadow = true;
            scene.add(mesh);
            obstacles.push({ mesh: mesh, type: type, lane: lane });
        }
        
        function createTrain(lane, z) {
            var train = new THREE.Group();
            
            var body = new THREE.Mesh(
                new THREE.BoxGeometry(3.2, 3.5, 10),
                new THREE.MeshStandardMaterial({ color: 0xCC0000 })
            );
            body.position.y = 1.75;
            body.castShadow = true;
            train.add(body);
            
            var windowMat = new THREE.MeshStandardMaterial({ color: 0x87CEEB });
            for (var i = -1; i <= 1; i++) {
                for (var j = 0; j < 3; j++) {
                    var win = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.1), windowMat);
                    win.position.set(i * 1.1, 2.5, -3 + j * 3);
                    train.add(win);
                }
            }
            
            train.position.set(LANES[lane], 0, z);
            train.castShadow = true;
            scene.add(train);
            trains.push({ mesh: train, lane: lane });
        }
        
        function createCoin(lane, z, y) {
            var mesh = new THREE.Mesh(
                new THREE.TorusGeometry(0.3, 0.1, 8, 24),
                new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8 })
            );
            mesh.position.set(LANES[lane], y || 1.5, z);
            mesh.castShadow = true;
            scene.add(mesh);
            coins.push({ mesh: mesh, collected: false });
        }
        
        function createPowerUp(lane, z) {
            var types = ['SHIELD', 'JETPACK', 'MAGNET', 'MULTI', 'SPEED'];
            var type = types[Math.floor(Math.random() * types.length)];
            var colors = { SHIELD: 0x00FF7F, JETPACK: 0xFF8C00, MAGNET: 0x00BFFF, MULTI: 0x9370DB, SPEED: 0xFF1493 };
            
            var mesh = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.5),
                new THREE.MeshStandardMaterial({ color: colors[type], emissive: colors[type], emissiveIntensity: 0.5 })
            );
            mesh.position.set(LANES[lane], 1.5, z);
            mesh.castShadow = true;
            scene.add(mesh);
            powerUps.push({ mesh: mesh, type: type, collected: false });
        }
        
        function generateWorld() {
            var z = -50;
            for (var i = 0; i < 15; i++) {
                generateSegment(z);
                z -= 40;
            }
        }
        
        function generateSegment(startZ) {
            var occupied = [];
            
            var numObs = 2 + Math.floor(Math.random() * 2);
            for (var i = 0; i < numObs; i++) {
                var avail = [0, 1, 2].filter(function(l) { return occupied.indexOf(l) === -1; });
                if (avail.length === 0) break;
                
                var lane = avail[Math.floor(Math.random() * avail.length)];
                occupied.push(lane);
                
                var types = ['LOW', 'HIGH', 'BLOCK'];
                var type = types[Math.floor(Math.random() * types.length)];
                createObstacle(type, lane, startZ - i * 15);
            }
            
            if (Math.random() > 0.4) {
                var coinLane = [0, 1, 2].filter(function(l) { return occupied.indexOf(l) === -1; });
                if (coinLane.length > 0) {
                    var cLane = coinLane[Math.floor(Math.random() * coinLane.length)];
                    for (var c = 0; c < 5; c++) {
                        createCoin(cLane, startZ - 5 - c * 2.5, 1.5);
                    }
                }
            }
            
            if (Math.random() > 0.85) {
                var lane = [0, 1, 2][Math.floor(Math.random() * 3)];
                createTrain(lane, startZ - 30);
            }
            
            if (Math.random() > 0.8) {
                var lane = [0, 1, 2].filter(function(l) { return occupied.indexOf(l) === -1; })[0];
                if (lane !== undefined) createPowerUp(lane, startZ - 20);
            }
        }
        
        function startGame() {
            state = 'PLAYING';
            score = 0;
            coinsCount = 0;
            speed = BASE_SPEED;
            level = 1;
            playerLane = 1;
            playerY = 0;
            velocityY = 0;
            isJumping = false;
            isSliding = false;
            isFlying = false;
            
            for (var k in powerUpsActive) powerUpsActive[k] = false;
            
            obstacles.forEach(function(o) { scene.remove(o.mesh); });
            obstacles = [];
            coins.forEach(function(c) { scene.remove(c.mesh); });
            coins = [];
            powerUps.forEach(function(p) { scene.remove(p.mesh); });
            powerUps = [];
            trains.forEach(function(t) { scene.remove(t.mesh); });
            trains = [];
            
            player.position.set(LANES[1], 0, 0);
            
            generateWorld();
            
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
        }
        
        function gameOver() {
            state = 'GAMEOVER';
            document.getElementById('gameOver').classList.remove('hidden');
            document.getElementById('finalScore').innerText = Math.floor(score);
        }
        
        function moveLeft() { if (playerLane > 0) playerLane--; }
        function moveRight() { if (playerLane < 2) playerLane++; }
        
        function jump() {
            if (!isJumping && !isSliding && !isFlying) {
                velocityY = JUMP_FORCE;
                isJumping = true;
            }
        }
        
        function slide() {
            if (!isSliding && !isJumping && !isFlying) {
                isSliding = true;
                slideTimer = 30;
            }
        }
        
        function showMsg(text) {
            var msg = document.getElementById('msg');
            msg.innerText = text;
            msg.classList.add('show');
            setTimeout(function() { msg.classList.remove('show'); }, 800);
        }
        
        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('coins').innerText = coinsCount;
            
            var container = document.getElementById('powerups');
            container.innerHTML = '';
            
            var icons = { SHIELD: '🛡️', JETPACK: '🚀', MAGNET: '🧲', MULTI: 'x2', SPEED: '⚡' };
            var colors = { SHIELD: '#00FF7F', JETPACK: '#FF8C00', MAGNET: '#00BFFF', MULTI: '#9370DB', SPEED: '#FF1493' };
            
            for (var type in powerUpsActive) {
                if (powerUpsActive[type]) {
                    var div = document.createElement('div');
                    div.className = 'power';
                    div.style.background = colors[type];
                    div.innerHTML = icons[type];
                    container.appendChild(div);
                }
            }
        }
        
        function getPlayerBox() {
            var h = isSliding ? 0.8 : 2;
            var y = isSliding ? 0.4 : 1;
            return new THREE.Box3(
                new THREE.Vector3(player.position.x - 0.4, y - h/2, player.position.z - 0.3),
                new THREE.Vector3(player.position.x + 0.4, y + h/2, player.position.z + 0.3)
            );
        }
        
        function update(delta) {
            if (state !== 'PLAYING') return;
            
            var currentSpeed = speed * (powerUpsActive.SPEED ? 1.4 : 1);
            
            player.position.z -= currentSpeed;
            score += currentSpeed * 0.5 * (powerUpsActive.MULTI ? 2 : 1);
            
            var newLevel = Math.floor(score / 300) + 1;
            if (newLevel > level) {
                level = newLevel;
                speed = Math.min(1.5, BASE_SPEED + (level - 1) * 0.05);
                showMsg('LEVEL ' + level);
            }
            
            player.position.x += (LANES[playerLane] - player.position.x) * 0.3;
            player.rotation.z = (LANES[playerLane] - player.position.x) * -0.1;
            
            if (isFlying) {
                player.position.y = 5 + Math.sin(Date.now() * 0.003) * 0.5;
            } else if (isJumping) {
                velocityY -= GRAVITY;
                playerY += velocityY;
                if (playerY <= 0) {
                    playerY = 0;
                    velocityY = 0;
                    isJumping = false;
                }
                player.position.y = playerY;
            }
            
            if (isSliding) {
                slideTimer--;
                if (slideTimer <= 0) isSliding = false;
            }
            
            var playerBox = getPlayerBox();
            
            for (var i = obstacles.length - 1; i >= 0; i--) {
                var obs = obstacles[i];
                obs.mesh.rotation.y += 0.02;
                
                if (obs.mesh.position.z > player.position.z + 20) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    continue;
                }
                
                var obsBox = new THREE.Box3().setFromObject(obs.mesh);
                
                if (playerBox.intersectsBox(obsBox)) {
                    if (powerUpsActive.SHIELD) {
                        powerUpsActive.SHIELD = false;
                        showMsg('SHIELD!');
                        scene.remove(obs.mesh);
                        obstacles.splice(i, 1);
                        continue;
                    }
                    
                    if (powerUpsActive.JETPACK) continue;
                    
                    if (obs.type === 'LOW') {
                        if (playerY > 0.8) continue;
                    } else if (obs.type === 'HIGH') {
                        if (isSliding) continue;
                    }
                    
                    gameOver();
                    return;
                }
            }
            
            for (var i = trains.length - 1; i >= 0; i--) {
                var train = trains[i];
                
                if (train.mesh.position.z > player.position.z + 25) {
                    scene.remove(train.mesh);
                    trains.splice(i, 1);
                    continue;
                }
                
                var trainBox = new THREE.Box3(
                    new THREE.Vector3(train.mesh.position.x - 1.6, 0, train.mesh.position.z - 5),
                    new THREE.Vector3(train.mesh.position.x + 1.6, 3.5, train.mesh.position.z + 5)
                );
                
                if (playerBox.intersectsBox(trainBox)) {
                    if (powerUpsActive.SHIELD) {
                        powerUpsActive.SHIELD = false;
                        showMsg('SHIELD!');
                        continue;
                    }
                    if (powerUpsActive.JETPACK) continue;
                    
                    gameOver();
                    return;
                }
            }
            
            for (var i = coins.length - 1; i >= 0; i--) {
                var coin = coins[i];
                coin.mesh.rotation.x += 0.1;
                
                if (powerUpsActive.MAGNET && !coin.collected) {
                    var dist = coin.mesh.position.distanceTo(player.position);
                    if (dist < 10) {
                        coin.mesh.position.lerp(player.position, 0.1);
                    }
                }
                
                if (coin.mesh.position.z > player.position.z + 20 || coin.collected) {
                    scene.remove(coin.mesh);
                    coins.splice(i, 1);
                    continue;
                }
                
                var coinBox = new THREE.Box3().setFromObject(coin.mesh);
                if (!coin.collected && playerBox.intersectsBox(coinBox)) {
                    coin.collected = true;
                    coinsCount++;
                    score += 10 * (powerUpsActive.MULTI ? 2 : 1);
                }
            }
            
            for (var i = powerUps.length - 1; i >= 0; i--) {
                var pu = powerUps[i];
                pu.mesh.rotation.y += 0.03;
                pu.mesh.position.y = 1.5 + Math.sin(Date.now() * 0.003) * 0.3;
                
                if (pu.mesh.position.z > player.position.z + 20 || pu.collected) {
                    scene.remove(pu.mesh);
                    powerUps.splice(i, 1);
                    continue;
                }
                
                var puBox = new THREE.Box3().setFromObject(pu.mesh);
                if (!pu.collected && playerBox.intersectsBox(puBox)) {
                    pu.collected = true;
                    powerUpsActive[pu.type] = true;
                    scene.remove(pu.mesh);
                    powerUps.splice(i, 1);
                    
                    var msgs = { SHIELD: 'SHIELD!', JETPACK: 'JETPACK!', MAGNET: 'MAGNET!', MULTI: '2X SCORE!', SPEED: 'SPEED!' };
                    showMsg(msgs[pu.type]);
                }
            }
            
            if (powerUpsActive.SHIELD && powerTimers.SHIELD++ > 360) powerUpsActive.SHIELD = false;
            if (powerUpsActive.JETPACK && powerTimers.JETPACK++ > 300) powerUpsActive.JETPACK = false;
            if (powerUpsActive.MAGNET && powerTimers.MAGNET++ > 480) powerUpsActive.MAGNET = false;
            if (powerUpsActive.MULTI && powerTimers.MULTI++ > 600) powerUpsActive.MULTI = false;
            if (powerUpsActive.SPEED && powerTimers.SPEED++ > 360) powerUpsActive.SPEED = false;
            
            var minZ = Math.min.apply(null, obstacles.map(function(o) { return o.mesh.position.z; }));
            if (minZ > player.position.z - 300) {
                generateSegment(minZ - 40);
            }
            
            updateUI();
            
            camera.position.z = player.position.z + 12;
            camera.position.y = powerUpsActive.JETPACK ? 12 : 6;
            camera.position.x += (player.position.x * 0.3 - camera.position.x) * 0.1;
            camera.lookAt(player.position.x * 0.5, 2, player.position.z - 10);
        }
        
        function loop(time) {
            requestAnimationFrame(loop);
            
            var delta = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;
            
            update(delta);
            renderer.render(scene, camera);
        }
        
        init();
    })();
    </script>
</body>
</html>
